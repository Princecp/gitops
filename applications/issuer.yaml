apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: issuer
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Princecp/gitops.git
    targetRevision: main
    path: apps/infra/issuer

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
