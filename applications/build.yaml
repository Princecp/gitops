apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insurance-build
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Princecp/gitops.git
    targetRevision: main
    path: apps/insurance/build

  destination:
    server: https://kubernetes.default.svc
    namespace: insurance-build

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
