apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-namespace
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Princecp/gitops.git
    targetRevision: main
    path: apps/infra/traefik-namespace

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
