apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: insurance-sandbox
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - insurance.51.159.207.81.nip.io
      secretName: insurance-tls

  rules:
    - host: insurance.51.159.207.81.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
