apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 26.0.0

    helm:
      values: |
        deployment:
          replicas: 2

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  syncPolicy:
    automated: {}
